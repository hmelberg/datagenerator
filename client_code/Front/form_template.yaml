    - type: Label
      properties: {role: null, align: left, tooltip: '', border: '', foreground: '',
        visible: true, text: "To create a new column, the user first has to select\
          \ how the content of the cells should be generated. \n\nThe easiest option\
          \ is the use the predefined patterns which contains the general structure\
          \ for many common medical codes as well as several other types of columns\
          \ (date of birth etc).\n\nIf the deisred content in not found in the predefined\
          \ pattern, you can choose between three user defined methods for generating\
          \ cell content:\n\n1. Prove a simple example of a code\nFor instance, typing\
          \ 'K50.1' will generate codes with one capital letter (between A and Z),\
          \ two random digits, a full stop sign, and a random number.\n\n2. A user\
          \ defined pattern. \nThis is useful if, for instance, you do not want the\
          \ to allow all possible letters, but only a subset. In a pattern,  each\
          \ position in the code is specified within brackets. \n\nFor instance: [a-n][1-3]\
          \ will generate codes with lower case letters between a and n, followed\
          \ by a number between 1 to 3. \n\nInstead of using hyphens, it is also possible\
          \ to provide a list:[a,d,f][2,5] will generate codes starting with either\
          \ a, d, or f, followed by the number 2 or 5. \n\nIt is also possible to\
          \ make the different elements in a list have different probabilities. Example:\
