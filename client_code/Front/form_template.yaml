      name: label_4
      properties: {align: left, background: '', bold: false, border: '', font: '', font_size: 22, foreground: '', icon: '', icon_align: left, italic: false, role: null, spacing_above: small, spacing_below: small, text: Workflow, tooltip: '', underline: false, visible: true}
      type: Label
    - event_bindings: {hide: Single}
      layout_properties: {grid_position: 'HCTHMZ,YAJHTB', slot: default}
      name: label_3
      properties:
        align: left
        background: ''
        bold: false
        border: ''
        font: ''
        font_size: 14
        foreground: ''
        icon: ''
        icon_align: left
        italic: false
        role: null
        spacing_above: small
        spacing_below: small
        text: |
          1. Select the structure of the data file (or just leave the defaults): Name, number of observations and whether each person has only one or possible more than one event. For instance, in a database of prescriptions the same person can have more than one event. In a database of causes of deaths, the same person is seldom observed twice.

          2. Click 'OK' to make the values and add a new column to the dataset. Repeat this step for additional columns.

          3. View the results and download the result as a csv file.
        tooltip: ''
        underline: false
        visible: true
      type: Label
    - layout_properties: {grid_position: 'WGHARX,WBFGNL'}
      name: label_6
      properties: {align: left, background: '', bold: false, border: '', font: '', font_size: 22, foreground: '', icon: '', icon_align: left, italic: false, role: null, spacing_above: small, spacing_below: small, text: 'How?', tooltip: '', underline: false, visible: true}
      type: Label
    - layout_properties: {grid_position: 'WGHARX,NRIHWG'}
      name: label_5
      properties:
        align: left
        background: ''
        bold: false
        border: ''
        font: ''
        font_size: null
        foreground: ''
        icon: ''
        icon_align: left
        italic: false
        role: null
        spacing_above: small
        spacing_below: small
        text: "To create a new column, the user first has to select how the content of the cells should be generated. \n\nThe easiest option is the use the predefined patterns which contains the general structure for many common medical codes as well as several other types of columns (date of birth etc).\n\nIf the deisred content in not found in the predefined pattern, you can choose between three user defined methods for generating cell content:\n\n1. Prove a simple example of a code\nFor instance, typing 'K50.1' will generate codes with one capital letter (between A and Z), two random digits, a full stop sign, and a random number.\n\n2. A user defined pattern. \nThis is useful if, for instance, you do not want the to allow all possible letters, but only a subset. In a pattern,  each position in the code is specified within brackets. \n\nFor instance: [a-n][1-3] will generate codes with lower case letters between a and n, followed by a number between 1 to 3. \n\nInstead of using hyphens, it is also possible to provide a list:[a,d,f][2,5] will generate codes starting with either a, d, or f, followed by the number 2 or 5. \n\nIt is also possible to make the different elements in a list have different probabilities. Example: [m,f;p=(0,51,0.49)] will generate a column with approximately 51% m's and 49% f's.\n\n3. Advanced users can also input a regex expression and the app will find random expressions that conform to the expression given. \n"
        tooltip: ''
        underline: false
        visible: true
      type: Label
