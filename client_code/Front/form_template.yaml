          Data from health registries are sensitive and difficult to obtain. Sometimes the solution is to use artificial data that has the same structure as the real data. This app makes it possible to create such data.

          For students and teachers: To generate data that can be used when learning how to analyze health register data

          For developers: To generate data that can be used to test libraries, databases and functions

          For researchers: Test hypotheses by comparing results from real and fake data
        tooltip: ''
        underline: false
        visible: true
      type: Label
